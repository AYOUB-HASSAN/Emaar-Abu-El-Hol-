<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الإنجازات | إعمار ابو الهول</title>
    <meta property="og:title" content="معرض الصور والفيديوهات - مبادرة إعمار ابو الهول">
    <meta property="og:description" content="شاهد بالصور والفيديوهات مراحل تقدم العمل في مجمع ابو الهول الطبي.">
    <meta property="og:image" content="assets/emmar.jpg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <nav class="glass-nav container">
                <div class="logo">إعمار<span>ابو الهول</span></div>
                <div class="nav-links">
                    <a href="index.html" class="admin-link" style="margin-left: 15px;">الرئيسية</a>
                </div>
            </nav>
        </header>

        <section class="gallery-page-header">
            <div class="container">
                <h1 class="section-title">معرض الإعمار</h1>
                <p class="section-subtitle">توثيق كامل لمسيرة البناء والإنجازات الميدانية</p>
                
                <div class="filters">
                    <button class="filter-btn active" onclick="filterGallery('all')">الكل</button>
                    <button class="filter-btn" onclick="filterGallery('progress')">مسار الإعمار</button>
                </div>
            </div>
        </section>

        <section class="gallery container" style="padding-bottom: 8rem;">
            <div class="gallery-grid" id="full-gallery-grid">
                <!-- Content loaded via app.js -->
            </div>
        </section>

        <footer class="main-footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 مبادرة إعمار ابو الهول - كلية الطب - جامعة الجزيرة</p>
                </div>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        // Check for URL filters
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const filter = params.get('filter');
            if (filter) filterGallery(filter);
        });
    </script>
</body>
</html>
